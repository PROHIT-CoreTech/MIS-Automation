services:
  - type: web
    name: mis-automation-backend
    env: node
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI_DEVELOPMENT
        sync: false
      - key: JWT_SECRET
        generateValue: true
